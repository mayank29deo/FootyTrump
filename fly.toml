# FootyTrump realtime server on Fly.io — dual-stack (IPv6) + WebSocket-native,
# so it's reachable on mobile data where the IPv4-only Railway host was not.
# App name must be globally unique; `fly launch` will let you change it if taken.
app = "footytrump-server"
primary_region = "bom"   # Mumbai (closest to India) — change with `fly regions` if needed

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0   # scales to zero when idle; first connection wakes it (~2-3s)

[env]
  PORT = "8080"
